services:
  finance-flow-db:
    image: postgres:16

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  finance-flow-app:
    build: .

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      finance-flow-db:
        condition: service_healthy

    ports:
      - "8000:8000"

volumes:
  postgres_data: