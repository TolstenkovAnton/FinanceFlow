<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>
        {% block title %}
        Finance Flow
        {% endblock %}
    </title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', path='style.css') }}"
    >
    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', path='logo_Finance_Flow.png') }}"
        sizes="32x32"
    >
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap"
        rel="stylesheet"
    >
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include "components/header.html" %}
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
