{% extends "base.html" %}
{% block title %}
Аналитика — Finance Flow
{% endblock %}
{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
{% endblock %}
{% block content %}
<div class="analytics-wrapper">
    <div class="analytics-sidebar">
        <form method="get" action="/analytics">
            <label class="currency-label">
                Выберите валюту
            </label>
            <select class="field-select currency-select" name="currency">
                <option
                    value="USD"
                    {% if currency == "USD" %}selected{% endif %}
                >
                    $ (USD)
                </option>
                <option
                    value="RUB"
                    {% if currency == "RUB" %}selected{% endif %}
                >
                    ₽ (RUB)
                </option>
                <option
                    value="EUR"
                    {% if currency == "EUR" %}selected{% endif %}
                >
                    € (EUR)
                </option>
            </select>
            <button type="submit" class="btn-apply">
                Применить
            </button>
        </form>
        <div class="categories-section">
            <p class="categories-title">
                Категории
            </p>
            <div id="legend-container"></div>
        </div>
    </div>
    <div class="charts-area">
        <div class="chart-section">
            <h2 class="chart-title">
                Доходы
            </h2>
            <canvas id="incomeChart"></canvas>
        </div>
        <div class="chart-section">
            <h2 class="chart-title">
                Расходы
            </h2>
            <canvas id="expenseChart"></canvas>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    const COLORS = ['#0077FF', '#FFD166', '#8B5CF6', '#06D6A0', '#F97316', '#E11D48'];
    const incomeData = {{ income_categories | tojson }};
    const expenseData = {{ expense_categories | tojson }};
    function makeChartData(data) {
        const labels = Object.keys(data);
        const values = Object.values(data);
        const total = values.reduce((a, b) => a + b, 0);
        return { labels, values, total };
    }
    function createChart(ctxId, data) {
        const { labels, values, total } = makeChartData(data);
        return new Chart(document.getElementById(ctxId), {
            type: 'pie',
            data: {
                labels,
                datasets: [{
                    data: values,
                    backgroundColor: COLORS.slice(0, labels.length),
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false
                    },
                    datalabels: {
                        color: '#fff',
                        font: {
                            family: 'Montserrat',
                            size: 14,
                            weight: '700'
                        },
                        formatter: (value, ctx) => {
                            const pct =
                                Math.round(value / total * 100);
                            return pct + '% ' +
                                ctx.chart.data.labels[ctx.dataIndex];
                        }
                    }
                }
            },
            plugins: [ChartDataLabels]
        });
    }
    createChart('incomeChart', incomeData);
    createChart('expenseChart', expenseData);
    const allCategories = [
        ...new Set([
            ...Object.keys(incomeData),
            ...Object.keys(expenseData)
        ])
    ];
    const container =
        document.getElementById('legend-container');
    allCategories.forEach((cat, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
            <div
                class="legend-dot"
                style="background:${COLORS[i % COLORS.length]}"
            ></div>

            <span>${cat}</span>
        `;
        container.appendChild(item);
    });
</script>
{% endblock %}
