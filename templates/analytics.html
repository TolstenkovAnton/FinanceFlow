<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Аналитика по категориям — Finance Flow</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" type="image/png" href="/static/logo_Finance_Flow.png" sizes="32x32" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="site-header">
    <img src="/static/Finance_Flow.png" alt="Finance Flow" class="logo-header" />
</header>

<div class="container">
    <h1>Аналитика по категориям</h1>

    <form method="get" action="/analytics" class="currency-form">
        <label for="currency">Выберите валюту:</label>
        <select name="currency" id="currency">
            <option value="RUB" {% if currency == "RUB" %}selected{% endif %}>RUB</option>
            <option value="USD" {% if currency == "USD" %}selected{% endif %}>USD</option>
            <option value="EUR" {% if currency == "EUR" %}selected{% endif %}>EUR</option>
        </select>
        <button type="submit">Применить</button>
    </form>

    <h2>Доходы по категориям</h2>
    <canvas id="incomeChart" width="400" height="200"></canvas>

    <h2>Расходы по категориям</h2>
    <canvas id="expenseChart" width="400" height="200"></canvas>

    <div style="text-align: center; margin-top: 20px;">
        <a href="/data" class="back-button">❰ Вернуться к отчёту</a>
    </div>
</div>

<footer class="site-footer">
    <p>&copy; 2025 Finance Flow. All rights reserved.</p>
</footer>

<script>
    const incomeData = {{ income_categories | tojson }};
    const expenseData = {{ expense_categories | tojson }};

    function createChart(ctx, data, title) {
        return new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(data),
                datasets: [{
                    data: Object.values(data),
                    backgroundColor: [
                        '#00BFFF', '#3399FF', '#66B2FF', '#99CCFF',
                        '#CCE5FF', '#0077FF', '#003366', '#0059b3',
                        '#FF6384', '#FFA726'
                    ],
                    borderColor: '#000',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: 'white',
                            font: { family: 'Montserrat' }
                        }
                    },
                    title: {
                        display: true,
                        text: title,
                        color: 'white',
                        font: { family: 'Montserrat', size: 18 }
                    }
                }
            }
        });
    }

    const incomeCtx = document.getElementById('incomeChart').getContext('2d');
    createChart(incomeCtx, incomeData, 'Доходы по категориям');

    const expenseCtx = document.getElementById('expenseChart').getContext('2d');
    createChart(expenseCtx, expenseData, 'Расходы по категориям');
</script>

</body>
</html>
