<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/logo_Finance_Flow.png" sizes="32x32">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <img src="/static/Finance_Flow.png" alt="Finance Flow" class="logo-header">
    </header>
    <div class="container">
        <h1>Вход</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post">
            <input type="text" name="username" placeholder="Логин" required />
            <input type="password" name="password" placeholder="Пароль" required />
            <button type="submit">Войти</button>
        </form>
        <a href="/register">Нет аккаунта?</a>
    </div>
    <footer class="site-footer">
        <p>© 2026 Finance Flow. All rights reserved.</p>
    </footer>
</body>
</html>
