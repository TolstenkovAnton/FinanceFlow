<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Finance Flow</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/logo_Finance_Flow.png" sizes="32x32">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-layout">
    <div class="auth-left">
        <img src="/static/Finance_Flow.png" alt="Finance Flow" class="auth-logo">
        <div class="auth-hero">
            <h1 class="auth-hero-title">Следи за<br>капиталом<br>с Finance Flow</h1>
            <p class="auth-hero-subtitle">Твой финансовый ассистент</p>
        </div>
    </div>
    <div class="auth-right">
        <h2 class="auth-form-title">Вход</h2>
        <p class="auth-form-subtitle">Введите свои данные<br>для входа в аккаунт</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post">
            <div class="field-group">
                <label class="field-label">Логин</label>
                <input class="field-input" type="text" name="username" required>
            </div>
            <div class="field-group">
                <label class="field-label">Пароль</label>
                <input class="field-input" type="password" name="password" required>
            </div>
            <button type="submit" class="btn-white">Войти</button>
        </form>
        <p class="auth-link">Нет аккаунта? <a href="/register">Регистрация</a></p>
    </div>
</div>
</body>
</html>
