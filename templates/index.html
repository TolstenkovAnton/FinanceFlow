<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Flow</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/logo_Finance_Flow.png" sizes="32x32">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
<header class="app-header">
    <a href="/">
        <img src="/static/Finance_Flow.png" alt="Finance Flow" class="app-logo">
    </a>
    <div class="app-header-right">
        <span class="welcome-text">Добро пожаловать, <strong>{{ user.username }}</strong></span>
        <a href="/logout" class="btn-blue">Выйти</a>
    </div>
</header>
<main class="app-main">
    <div class="index-wrapper">
        <div class="forms-grid">
            <div>
                <h2 class="section-title">Добавить доход</h2>
                <form method="post" action="/add-income">
                    <div class="field-group">
                        <label class="field-label">Описание</label>
                        <input class="field-input" type="text" name="description" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Сумма</label>
                        <input class="field-input" type="number" step="0.01" name="amount" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Валюта</label>
                        <select class="field-select" name="currency" required>
                            <option value="RUB">₽ RUB</option>
                            <option value="EUR">€ EUR</option>
                            <option value="USD">$ USD</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-add">Добавить</button>
                </form>
            </div>
            <div>
                <h2 class="section-title">Добавить расход</h2>
                <form method="post" action="/add-expense">
                    <div class="field-group">
                        <label class="field-label">Описание</label>
                        <input class="field-input" type="text" name="description" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Сумма</label>
                        <input class="field-input" type="number" step="0.01" name="amount" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Валюта</label>
                        <select class="field-select" name="currency" required>
                            <option value="RUB">₽ RUB</option>
                            <option value="EUR">€ EUR</option>
                            <option value="USD">$ USD</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-add">Добавить</button>
                </form>
            </div>
        </div>
        <div class="index-nav">
            <a href="/data" class="btn-outline">Аналитика</a>
        </div>
    </div>
</main>
</body>
</html>
