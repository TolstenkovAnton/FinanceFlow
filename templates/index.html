{% extends "base.html" %}
{% block title %}
Finance Flow
{% endblock %}
{% block content %}
<div class="index-wrapper">
    <div class="forms-grid">
        <div>
            <h2 class="section-title">
                Добавить доход
            </h2>
            <form method="post" action="/add-income">
                <div class="field-group">
                    <label class="field-label">
                        Описание
                    </label>
                    <input
                        class="field-input"
                        type="text"
                        name="description"
                        required
                    >
                </div>
                <div class="field-group">
                    <label class="field-label">
                        Сумма
                    </label>
                    <input
                        class="field-input"
                        type="number"
                        step="1"
                        name="amount"
                        required
                    >
                </div>
                <div class="field-group">
                    <label class="field-label">
                        Валюта
                    </label>
                    <select
                        class="field-select"
                        name="currency"
                        required
                    >
                        <option value="RUB">
                            ₽ RUB
                        </option>

                        <option value="EUR">
                            € EUR
                        </option>

                        <option value="USD">
                            $ USD
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn-add">
                    Добавить
                </button>
            </form>
        </div>
        <div>
            <h2 class="section-title">
                Добавить расход
            </h2>
            <form method="post" action="/add-expense">
                <div class="field-group">
                    <label class="field-label">
                        Описание
                    </label>
                    <input
                        class="field-input"
                        type="text"
                        name="description"
                        required
                    >
                </div>
                <div class="field-group">
                    <label class="field-label">
                        Сумма
                    </label>
                    <input
                        class="field-input"
                        type="number"
                        step="1"
                        name="amount"
                        required
                    >
                </div>
                <div class="field-group">
                    <label class="field-label">
                        Валюта
                    </label>
                    <select
                        class="field-select"
                        name="currency"
                        required
                    >
                        <option value="RUB">
                            ₽ RUB
                        </option>

                        <option value="EUR">
                            € EUR
                        </option>

                        <option value="USD">
                            $ USD
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn-add">
                    Добавить
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
